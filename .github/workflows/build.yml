name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_VERSION: "0.2.0"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Prepare artifacts
        run: |
          mkdir -p linux-builds
          cp src-tauri/target/release/bundle/appimage/*.AppImage linux-builds/ || true
          cp src-tauri/target/release/bundle/deb/*.deb linux-builds/ || true
          cp src-tauri/target/release/bundle/rpm/*.rpm linux-builds/ || true
          ls -la linux-builds/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: linux-builds/

  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows-builds
          Get-ChildItem -Path "src-tauri/target/release/bundle/nsis/*.exe" | ForEach-Object {
            $newName = "ParentShield_${{ env.APP_VERSION }}_x64-setup.exe"
            Copy-Item $_.FullName -Destination "windows-builds/$newName"
          }
          Get-ChildItem windows-builds/

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: windows-builds/

  build-windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app for x86
        run: npm run tauri build -- --target i686-pc-windows-msvc

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows-x86-builds
          Get-ChildItem -Path "src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe" | ForEach-Object {
            $newName = "ParentShield_${{ env.APP_VERSION }}_x86-setup.exe"
            Copy-Item $_.FullName -Destination "windows-x86-builds/$newName"
          }
          Get-ChildItem windows-x86-builds/

      - name: Upload Windows x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86
          path: windows-x86-builds/

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app for ARM64
        run: npm run tauri build -- --target aarch64-pc-windows-msvc

      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows-arm64-builds
          Get-ChildItem -Path "src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe" | ForEach-Object {
            $newName = "ParentShield_${{ env.APP_VERSION }}_arm64-setup.exe"
            Copy-Item $_.FullName -Destination "windows-arm64-builds/$newName"
          }
          Get-ChildItem windows-arm64-builds/

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: windows-arm64-builds/

  build-macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build daemon as universal binary
        working-directory: src-tauri
        run: |
          # Build daemon for both architectures
          cargo build --release --bin parentshield-daemon --target x86_64-apple-darwin
          cargo build --release --bin parentshield-daemon --target aarch64-apple-darwin

          # Create universal binary output directory
          mkdir -p target/universal-apple-darwin/release

          # Combine into universal binary using lipo
          lipo -create \
            target/x86_64-apple-darwin/release/parentshield-daemon \
            target/aarch64-apple-darwin/release/parentshield-daemon \
            -output target/universal-apple-darwin/release/parentshield-daemon

      - name: Build Universal Binary
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Prepare artifacts
        run: |
          mkdir -p macos-builds
          for file in src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg; do
            cp "$file" "macos-builds/ParentShield_${{ env.APP_VERSION }}_universal.dmg"
          done
          ls -la macos-builds/

      - name: Upload macOS Universal artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: macos-builds/

  release:
    needs: [build-linux, build-windows-x64, build-windows-x86, build-windows-arm64, build-macos-universal]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts to match expected filenames
        run: |
          mkdir -p release-files

          # Linux
          cp artifacts/linux-builds/*.deb "release-files/parentshield_${{ env.APP_VERSION }}_amd64.deb" || true
          cp artifacts/linux-builds/*.AppImage "release-files/ParentShield-${{ env.APP_VERSION }}-x86_64.AppImage" || true
          cp artifacts/linux-builds/*.rpm "release-files/parentshield-${{ env.APP_VERSION }}-1.x86_64.rpm" || true

          # Windows
          cp artifacts/windows-x64/*.exe "release-files/ParentShield-${{ env.APP_VERSION }}-x64-setup.exe" || true
          cp artifacts/windows-x86/*.exe "release-files/ParentShield-${{ env.APP_VERSION }}-x86-setup.exe" || true
          cp artifacts/windows-arm64/*.exe "release-files/ParentShield-${{ env.APP_VERSION }}-arm64-setup.exe" || true

          # macOS
          cp artifacts/macos-universal/*.dmg "release-files/ParentShield-${{ env.APP_VERSION }}-universal.dmg" || true

          echo "=== Release files ===" && ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: ParentShield v${{ env.APP_VERSION }}
          files: release-files/*
          draft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true

